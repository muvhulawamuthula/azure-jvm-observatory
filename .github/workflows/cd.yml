name: CD

# Manual, release-controlled deploy to Azure Container Apps.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to build and deploy"
        required: false
        default: "latest"

# Required for OIDC federated login to Azure (no stored secret).
permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: azure-jvm-observatory

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw --batch-mode clean verify

      - name: Resolve image tag
        id: tag
        run: echo "value=${{ github.event.inputs.image_tag || 'latest' }}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        # Build on the runner and push, rather than az acr build, because ACR
        # Tasks is not available in this registry's region (South Africa North).
        run: |
          IMAGE="${{ vars.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${{ steps.tag.outputs.value }}"
          az acr login --name "${{ vars.ACR_NAME }}"
          docker build -t "$IMAGE" -f Dockerfile .
          docker push "$IMAGE"

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --image "${{ vars.ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${{ steps.tag.outputs.value }}"
