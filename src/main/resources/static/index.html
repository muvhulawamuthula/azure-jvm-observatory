<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Azure JVM Performance Observatory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            padding: 30px;
        }

        h1 {
            color: #38bdf8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.08);
        }

        .metric {
            font-size: 32px;
            font-weight: bold;
            color: #22c55e;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 16px;
            margin: 6px 4px 6px 0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button.danger {
            background: #dc2626;
        }

        button.warning {
            background: #f59e0b;
            color: #111827;
        }

        pre {
            background: #020617;
            padding: 15px;
            border-radius: 12px;
            overflow-x: auto;
            color: #a7f3d0;
        }
    </style>
</head>
<body>

<h1>🚀 Azure JVM Performance Observatory</h1>
<p>Live JVM performance lab for CPU, memory, threads, GC, and Prometheus metrics.</p>

<div class="grid">
    <div class="card">
        <h2>Heap Used</h2>
        <div class="metric" id="heapUsed">...</div>
    </div>

    <div class="card">
        <h2>Heap Max</h2>
        <div class="metric" id="heapMax">...</div>
    </div>

    <div class="card">
        <h2>Live Threads</h2>
        <div class="metric" id="liveThreads">...</div>
    </div>

    <div class="card">
        <h2>Peak Threads</h2>
        <div class="metric" id="peakThreads">...</div>
    </div>
</div>

<div class="card" style="margin-top: 25px;">
    <h2>Stress Lab Controls</h2>

    <button onclick="post('/api/load/cpu?seconds=20')">Burn CPU 20s</button>
    <button class="danger" onclick="post('/api/load/memory-leak?megabytes=100')">Leak 100MB</button>
    <button class="warning" onclick="post('/api/load/memory-clear')">Clear Memory</button>
    <button onclick="post('/api/load/virtual-threads?count=1000')">Create 1000 Virtual Threads</button>
    <button class="danger" onclick="post('/api/load/platform-threads?count=100')">Block 100 Platform Threads</button>
</div>

<div class="card" style="margin-top: 25px;">
    <h2>Raw JVM Metrics</h2>
    <pre id="raw">Loading...</pre>
</div>

<script>
    async function loadMetrics() {
        try {
            const response = await fetch('/api/metrics/jvm');
            const data = await response.json();

            document.getElementById('heapUsed').innerText = data.heapUsedMB + ' MB';
            document.getElementById('heapMax').innerText = data.heapMaxMB + ' MB';
            document.getElementById('liveThreads').innerText = data.liveThreads;
            document.getElementById('peakThreads').innerText = data.peakThreads;

            document.getElementById('raw').innerText = JSON.stringify(data, null, 2);
        } catch (error) {
            document.getElementById('raw').innerText = 'Failed to load metrics: ' + error;
        }
    }

    async function post(path) {
        const response = await fetch(path, { method: 'POST' });
        const text = await response.text();
        alert(text);
        loadMetrics();
    }

    loadMetrics();
    setInterval(loadMetrics, 3000);
</script>

</body>
</html>
