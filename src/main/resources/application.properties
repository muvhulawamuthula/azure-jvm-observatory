spring.application.name=azure-jvm-observatory
server.port=8080

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=azure-jvm-observatory

# Shared API key required (in the X-Stress-Key header) for the destructive
# /api/load/* stress-lab endpoints. Supplied via the STRESS_LAB_KEY env var;
# when unset the stress lab is locked (fail closed).
stresslab.key=${STRESS_LAB_KEY:}

# JvmHealthWatcher alert thresholds. A "JVM ALERT" is logged when heap usage
# exceeds this percentage or the live thread count exceeds this limit.
observatory.health.heap-alert-threshold-percent=80
observatory.health.thread-alert-threshold=200